<!doctype html>
<html>
<head>
  <title>InfoHash Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 12px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      margin-top: 4px;
    }

    .row {
      margin-top: 12px;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 8px;
      font-weight: bold;
    }

    #status {
      margin-top: 10px;
      color: green;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h3>InfoHash Tracker</h3>

  <label for="bookUrl">Book URL</label>
  <input id="bookUrl" type="text" placeholder="https://example.com/books/">

  <div class="row">
    <label>
      <input id="showLastVisitBox" type="checkbox">
      Show last visited box
    </label>
  </div>

  <button id="save">Save</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
