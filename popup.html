<!doctype html>
<html>
<head>
  <title>InfoHash Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 12px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      margin-top: 4px;
    }

    .row {
      margin-top: 12px;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 8px;
      font-weight: bold;
    }

    fieldset {
      border: 1px solid #ccc;
      margin: 16px 0 0;
      padding: 10px;
    }

    legend {
      font-weight: bold;
    }

    .radio-label {
      font-weight: normal;
      margin-top: 8px;
    }

    .file-input {
      margin-top: 10px;
      width: 100%;
    }

    #status {
      margin-top: 10px;
      color: green;
      font-size: 12px;
      white-space: pre-line;
    }

    #status.error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <h3>InfoHash Tracker</h3>

  <label for="bookUrl">Book URL</label>
  <input id="bookUrl" type="text" placeholder="https://example.com/books/">

  <div class="row">
    <label>
      <input id="showLastVisitBox" type="checkbox">
      Show last visited box
    </label>
  </div>

  <button id="save">Save</button>

  <fieldset>
    <legend>Backup and Restore</legend>

    <button id="exportBackup">Export Backup</button>

    <label class="radio-label">
      <input type="radio" name="restoreMode" value="append" checked>
      Append info hashes only
    </label>

    <label class="radio-label">
      <input type="radio" name="restoreMode" value="replace">
      Replace current data
    </label>

    <input id="importBackupFile" class="file-input" type="file" accept="application/json,.json">
    <button id="importBackup">Import Backup</button>
  </fieldset>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
